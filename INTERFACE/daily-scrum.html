<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMS Daily Scrum</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #f5e6c8;
      background-image: radial-gradient(circle, #c8a882 1px, transparent 1px);
      background-size: 18px 18px;
      font-family: 'Comic Neue', 'Comic Sans MS', cursive;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    /* ── MASTHEAD ── */
    .masthead {
      text-align: center;
      background: #1a1a1a;
      border: 4px solid #1a1a1a;
      border-radius: 6px;
      padding: 0.75rem 2rem;
      width: 100%;
      max-width: 860px;
      box-shadow: 6px 6px 0 #888;
      margin-bottom: 2rem;
    }

    .masthead h1 {
      font-family: 'Bangers', Impact, sans-serif;
      font-size: 3rem;
      letter-spacing: 0.1em;
      color: #ffe600;
      text-shadow: 3px 3px 0 #e94560;
      line-height: 1;
    }

    .masthead .meta {
      color: #aaa;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .masthead .project-tag {
      display: inline-block;
      background: #e94560;
      color: white;
      font-family: 'Bangers', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.9rem;
      border-radius: 3px;
      margin-top: 0.4rem;
    }

    /* ── ROOM ── */
    .room {
      width: 100%;
      max-width: 860px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── TABLE ── */
    .table-wrap {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: auto auto auto;
      align-items: center;
      gap: 0.5rem;
    }

    .table-surface {
      grid-column: 2;
      grid-row: 2;
      width: 260px;
      height: 110px;
      background: linear-gradient(160deg, #8B5E3C 0%, #6B4226 60%, #4a2c1a 100%);
      border: 4px solid #2a1a0a;
      border-radius: 55px;
      box-shadow:
        0 8px 0 #2a1a0a,
        inset 0 2px 6px rgba(255,255,255,0.15),
        6px 6px 0 #555;
      position: relative;
    }

    .table-surface::after {
      content: '';
      position: absolute;
      inset: 8px 20px;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 40px;
    }

    /* seat positions */
    .seat-top-left    { grid-column: 1; grid-row: 1; justify-self: end;   align-self: end; }
    .seat-top-right   { grid-column: 3; grid-row: 1; justify-self: start; align-self: end; }
    .seat-bottom-left { grid-column: 1; grid-row: 3; justify-self: end;   align-self: start; }
    .seat-bottom-right{ grid-column: 3; grid-row: 3; justify-self: start; align-self: start; }

    /* ── PERSONA SEAT ── */
    .persona {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 0.5rem;
      transition: transform 0.15s ease;
      user-select: none;
    }

    .persona:hover {
      transform: translateY(-6px) scale(1.05);
    }

    .persona img {
      width: 170px;
      height: 210px;
      object-fit: contain;
      object-position: bottom center;
      display: block;
      filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3));
    }

    .persona .nameplate {
      font-family: 'Bangers', Impact, sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: white;
      background: #1a1a1a;
      padding: 0.1rem 0.8rem;
      border-radius: 3px;
      margin-top: 0.3rem;
      border: 2px solid #1a1a1a;
    }

    .persona .roletag {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: white;
      padding: 0.1rem 0.6rem;
      border-radius: 2px;
      margin-top: 2px;
    }

    /* ── HINT ── */
    .hint {
      margin-top: 1.2rem;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      text-align: center;
    }

    /* ── REPORT OVERLAY ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .overlay.active {
      display: flex;
    }

    .report-bubble {
      background: #fffde7;
      border: 4px solid #1a1a1a;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #1a1a1a;
      width: 100%;
      max-width: 500px;
      animation: popIn 0.18s ease;
      position: relative;
    }

    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .report-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 3px solid #1a1a1a;
    }

    .report-avatar {
      width: 70px;
      height: 90px;
      object-fit: contain;
      object-position: bottom center;
      flex-shrink: 0;
    }

    .report-header-text h2 {
      font-family: 'Bangers', Impact, sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      line-height: 1;
    }

    .report-header-text .role {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: white;
      padding: 0.15rem 0.6rem;
      border-radius: 3px;
      margin-top: 0.3rem;
      display: inline-block;
    }

    .report-body {
      padding: 1rem 1.25rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    /* ── SECTION BUTTONS ── */
    .section-buttons {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
    }

    .section-btn {
      font-family: 'Bangers', Impact, sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      padding: 0.4rem 1.2rem;
      border: 3px solid #1a1a1a;
      border-radius: 6px;
      cursor: pointer;
      background: white;
      color: #1a1a1a;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 3px 3px 0 #1a1a1a;
    }

    .section-btn:hover {
      transform: translateY(-2px);
      box-shadow: 4px 5px 0 #1a1a1a;
    }

    .section-btn.active {
      color: white;
      transform: translateY(1px);
      box-shadow: 1px 1px 0 #1a1a1a;
    }

    .section-btn.btn-done.active     { background: #166534; border-color: #166534; }
    .section-btn.btn-next.active     { background: #1e3a8a; border-color: #1e3a8a; }
    .section-btn.btn-blockers.active { background: #991b1b; border-color: #991b1b; }

    /* ── CONTENT PANEL ── */
    .section-content {
      background: white;
      border: 3px solid #1a1a1a;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      min-height: 100px;
      display: none;
    }

    .section-content.visible { display: block; }

    .section-content ul { list-style: none; }
    .section-content ul li {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #222;
      padding-left: 1.2rem;
      position: relative;
    }
    .section-content ul li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: #aaa;
      font-size: 0.9rem;
      top: 0.1rem;
    }

    .no-blockers {
      font-size: 1.1rem;
      color: #aaa;
      font-style: italic;
      padding-left: 1.2rem;
    }

    .close-btn {
      position: absolute;
      top: -14px; right: -14px;
      width: 30px; height: 30px;
      background: #e94560;
      color: white;
      border: 3px solid #1a1a1a;
      border-radius: 50%;
      font-family: 'Bangers', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* ── FOOTER ── */
    .footer-strip {
      width: 100%;
      max-width: 860px;
      margin-top: 1.5rem;
      background: #1a1a1a;
      color: #666;
      font-size: 0.7rem;
      text-align: center;
      padding: 0.4rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 3px solid #1a1a1a;
      box-shadow: 6px 6px 0 #888;
    }
  </style>
</head>
<body>

  <div class="masthead">
    <h1>☀ Daily Scrum</h1>
    <div class="meta">Wednesday, April 22, 2026 &nbsp;·&nbsp; Sprint 4</div>
    <div class="project-tag">AMS — Agent Management System</div>
  </div>

  <div class="room">
    <div class="table-wrap">

      <!-- TOP ROW -->
      <div class="persona seat-top-left" onclick="showReport('priya')">
        <img src="avatars/priya-product-owner.png" alt="Priya">
        <div class="nameplate">Priya</div>
        <div class="roletag" style="background:#7c3aed;">Product Owner</div>
      </div>

      <div class="table-surface"></div>

      <div class="persona seat-top-right" onclick="showReport('cody')">
        <img src="avatars/cody-coder.png" alt="Cody">
        <div class="nameplate">Cody</div>
        <div class="roletag" style="background:#059669;">Coder</div>
      </div>

      <!-- BOTTOM ROW -->
      <div class="persona seat-bottom-left" onclick="showReport('lila')">
        <img src="avatars/lila-librarian.png" alt="Lila">
        <div class="nameplate">Lila</div>
        <div class="roletag" style="background:#7c2d8c;">Librarian / Doc</div>
      </div>

      <div></div><!-- table spacer -->

      <div class="persona seat-bottom-right" onclick="showReport('eric')">
        <img src="avatars/eric-ea.png" alt="Eric">
        <div class="nameplate">Eric</div>
        <div class="roletag" style="background:#0369a1;">Exec Assistant</div>
      </div>

    </div>

    <div class="hint">hover or tap a team member to hear their report</div>
  </div>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeReport(event)">
    <div class="report-bubble" id="report-bubble">
      <button class="close-btn" onclick="closeAll()">✕</button>
      <div class="report-header">
        <img class="report-avatar" id="report-avatar" src="" alt="">
        <div class="report-header-text">
          <h2 id="report-name"></h2>
          <div class="role" id="report-role"></div>
        </div>
      </div>
      <div class="report-body" id="report-body"></div>
    </div>
  </div>

  <div class="footer-strip">
    Generated by AMS · Agent Management System · agent-handoff protocol
  </div>

  <script>
    const reports = {
      priya: {
        name: 'Priya',
        role: 'Product Owner',
        color: '#7c3aed',
        avatar: 'avatars/priya-product-owner.png',
        done: [
          'Finalized persona list — Scrum Master, QA/Tester, Researcher added',
          'Approved presentation.md outline for Stanford Webcamp'
        ],
        next: [
          'Define acceptance criteria for Daily Scrum interface',
          'Prioritize Part 3 survey content for April 30 talk'
        ],
        blockers: []
      },
      cody: {
        name: 'Cody',
        role: 'Coder',
        color: '#059669',
        avatar: 'avatars/cody-coder.png',
        done: [
          'Built Daily Scrum HTML prototype — dark theme v1',
          'Confirmed HANDOFF/ file structure supports standup extraction'
        ],
        next: [
          'Build skill to read HANDOFF/ and auto-generate standup content',
          'Wire real avatar images into comic book layout'
        ],
        blockers: [
          'Avatar file paths needed before image wiring'
        ]
      },
      lila: {
        name: 'Lila',
        role: 'Librarian / Documentarian',
        color: '#7c2d8c',
        avatar: 'avatars/lila-librarian.png',
        done: [
          'Reformatted all root .md files with headers, tables, cross-links',
          'Added Sprint Planning & Task Triage section to presentation.md'
        ],
        next: [
          'Fill Tooling.md placeholders for Part 3 survey tools',
          'Document Daily Scrum skill once spec is locked'
        ],
        blockers: [
          'Need descriptions for Spec Kitty, Rich Yaker, Lullabot tools'
        ]
      },
      eric: {
        name: 'Eric',
        role: 'Executive Assistant',
        color: '#0369a1',
        avatar: 'avatars/eric-ea.png',
        done: [
          'Confirmed Stanford Webcamp date: April 30, 2026',
          'Logged sprint planning session notes to HANDOFF/'
        ],
        next: [
          'Draft talk run-of-show with timing breakdown',
          'Coordinate avatar asset handoff to Cody'
        ],
        blockers: []
      }
    };

    function showReport(key) {
      const p = reports[key];
      document.getElementById('report-avatar').src = p.avatar;
      document.getElementById('report-avatar').alt = p.name;
      document.getElementById('report-name').textContent = p.name;
      const roleEl = document.getElementById('report-role');
      roleEl.textContent = p.role;
      roleEl.style.background = p.color;

      const body = document.getElementById('report-body');
      body.innerHTML = `
        <div class="section-buttons">
          <button class="section-btn btn-done"     onclick="showSection('done')">Done</button>
          <button class="section-btn btn-next"     onclick="showSection('next')">Next</button>
          <button class="section-btn btn-blockers" onclick="showSection('blockers')">Blockers</button>
        </div>
        <div class="section-content" id="content-done">
          <ul>${p.done.map(i => `<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="section-content" id="content-next">
          <ul>${p.next.map(i => `<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="section-content" id="content-blockers">
          ${p.blockers.length
            ? `<ul>${p.blockers.map(i => `<li>${i}</li>`).join('')}</ul>`
            : `<p class="no-blockers">None — all clear!</p>`}
        </div>`;

      document.getElementById('overlay').classList.add('active');
    }

    function showSection(section) {
      // clear all
      document.querySelectorAll('.section-content').forEach(el => el.classList.remove('visible'));
      document.querySelectorAll('.section-btn').forEach(el => el.classList.remove('active'));
      // activate chosen
      document.getElementById('content-' + section).classList.add('visible');
      document.querySelector('.btn-' + section).classList.add('active');
    }

    function closeReport(e) {
      if (e.target === document.getElementById('overlay')) closeAll();
    }

    function closeAll() {
      document.getElementById('overlay').classList.remove('active');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(); });
  </script>

</body>
</html>
